<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>똑띠 v2</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Gothic+Coding:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* ── 변수 ── */
  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --border:   #2a2d3a;
    --accent:   #7eb8f7;
    --accent2:  #f7c87e;
    --text:     #e8eaf0;
    --sub:      #8892a4;
    --ok:       #6ee7b7;
    --warn:     #fca5a5;
    --font-ui:  'Gowun Dodum', sans-serif;
    --font-mono:'Nanum Gothic Coding', monospace;
    --radius:   12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── 헤더 ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--sub);
    background: var(--bg);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--ok);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .clock {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--sub);
    letter-spacing: 1px;
  }

  /* ── 탭 ── */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 12px 24px 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .tab {
    padding: 8px 18px;
    border: none;
    background: none;
    color: var(--sub);
    font-family: var(--font-ui);
    font-size: 14px;
    cursor: pointer;
    border-radius: 8px 8px 0 0;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: rgba(126,184,247,0.06);
  }

  /* ── 메인 레이아웃 ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── 채팅 탭 ── */
  .panel {
    display: none;
    flex: 1;
    flex-direction: column;
    overflow: hidden;
  }

  .panel.active { display: flex; }

  /* 채팅 */
  #panel-chat { flex-direction: row; }

  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    background: rgba(126,184,247,0.12);
    border: 1px solid rgba(126,184,247,0.2);
    align-self: flex-end;
    color: var(--text);
  }

  .msg.ai {
    background: var(--surface);
    border: 1px solid var(--border);
    align-self: flex-start;
    color: var(--text);
  }

  .msg.system {
    align-self: center;
    background: transparent;
    border: none;
    color: var(--sub);
    font-size: 12px;
    padding: 4px;
  }

  .msg-time {
    font-size: 11px;
    color: var(--sub);
    margin-top: 4px;
  }

  .typing {
    align-self: flex-start;
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .typing span {
    width: 6px;
    height: 6px;
    background: var(--sub);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* 입력창 */
  .chat-input-wrap {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .chat-input-wrap textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 14px;
    padding: 10px 14px;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    transition: border-color 0.15s;
  }

  .chat-input-wrap textarea:focus {
    border-color: var(--accent);
  }

  .chat-input-wrap textarea::placeholder { color: var(--sub); }

  .btn-send {
    width: 44px;
    height: 44px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  .btn-send:hover { opacity: 0.85; }
  .btn-send svg { color: #0f1117; }

  /* ── 사이드바 ── */
  .sidebar {
    width: 280px;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
    flex-shrink: 0;
  }

  .sidebar-section {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .sidebar-section:last-child { border-bottom: none; }

  .sidebar-title {
    font-size: 11px;
    color: var(--sub);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 4px;
    font-family: var(--font-mono);
  }

  .remind-item, .shop-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .remind-item:hover, .shop-item:hover { border-color: var(--sub); }

  .remind-item.done, .shop-item.done {
    opacity: 0.4;
    text-decoration: line-through;
  }

  .item-check {
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .remind-item.done .item-check,
  .shop-item.done .item-check {
    background: var(--ok);
    border-color: var(--ok);
  }

  .item-body { flex: 1; }
  .item-text { line-height: 1.4; }
  .item-meta { font-size: 11px; color: var(--sub); margin-top: 2px; }

  /* 오늘 알림 예정 상단 고정 */
  .remind-item.upcoming {
    border-color: var(--accent2);
    background: rgba(247,200,126,0.05);
  }

  .empty-msg {
    font-size: 12px;
    color: var(--sub);
    text-align: center;
    padding: 12px 0;
  }

  /* ── 캘린더 탭 ── */
  #panel-calendar {
    padding: 24px;
    overflow-y: auto;
    flex-direction: column;
    gap: 12px;
  }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .cal-title { font-size: 16px; font-weight: 600; }

  .btn-refresh {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

  .cal-event {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    animation: fadeUp 0.2s ease;
  }

  .cal-date-badge {
    background: rgba(126,184,247,0.1);
    border: 1px solid rgba(126,184,247,0.2);
    border-radius: 8px;
    padding: 6px 10px;
    text-align: center;
    flex-shrink: 0;
    min-width: 48px;
  }

  .cal-date-badge .month { font-size: 10px; color: var(--accent); text-transform: uppercase; }
  .cal-date-badge .day   { font-size: 18px; font-weight: 700; line-height: 1.2; }

  .cal-event-body { flex: 1; }
  .cal-event-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .cal-event-time  { font-size: 12px; color: var(--sub); }

  /* ── 리마인드 탭 ── */
  #panel-remind {
    padding: 24px;
    overflow-y: auto;
    flex-direction: column;
    gap: 10px;
  }

  /* ── 쇼핑 탭 ── */
  #panel-shop {
    padding: 24px;
    overflow-y: auto;
    flex-direction: column;
    gap: 10px;
  }

  /* ── 설정 탭 ── */
  #panel-settings {
    padding: 24px;
    overflow-y: auto;
    flex-direction: column;
    gap: 20px;
  }

  .settings-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .settings-group-title {
    font-size: 12px;
    color: var(--sub);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-family: var(--font-mono);
    margin-bottom: 2px;
  }

  .setting-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .setting-row label {
    font-size: 13px;
    color: var(--sub);
  }

  .setting-row input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .setting-row input:focus { border-color: var(--accent); }

  .btn-save-settings {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #0f1117;
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 700;
    padding: 10px 20px;
    cursor: pointer;
    align-self: flex-start;
    transition: opacity 0.15s;
  }

  .btn-save-settings:hover { opacity: 0.85; }

  .btn-action {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 13px;
    padding: 8px 16px;
    cursor: pointer;
    transition: border-color 0.15s;
    align-self: flex-start;
  }

  .btn-action:hover { border-color: var(--accent); color: var(--accent); }

  /* 반응형 */
  @media (max-width: 900px) {
    .sidebar { display: none; }
  }
</style>
</head>
<body>

<!-- ── 헤더 ── -->
<header>
  <div class="header-left">
    <div class="logo">똑띠</div>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">연결 확인 중</span>
    </div>
  </div>
  <div class="clock" id="clock">--:--:--</div>
</header>

<!-- ── 탭 ── -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('chat')">대화</button>
  <button class="tab" onclick="switchTab('calendar')">캘린더</button>
  <button class="tab" onclick="switchTab('remind')">리마인드</button>
  <button class="tab" onclick="switchTab('shop')">쇼핑</button>
  <button class="tab" onclick="switchTab('settings')">설정</button>
</div>

<!-- ── 메인 ── -->
<div class="main">

  <!-- ── 채팅 패널 ── -->
  <div class="panel active" id="panel-chat">
    <div class="chat-area">
      <div class="chat-messages" id="chatMessages">
        <div class="msg system">똑띠가 준비됐어요. 무엇이든 물어보세요.</div>
      </div>
      <div class="chat-input-wrap">
        <textarea id="chatInput" placeholder="메시지를 입력하세요..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-send" onclick="sendMessage()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ── 사이드바 ── -->
    <div class="sidebar">
      <div class="sidebar-section" style="flex: 0 0 auto; max-height: 50%;">
        <div class="sidebar-title">오늘 리마인드</div>
        <div id="sideRemindList"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">쇼핑 목록</div>
        <div id="sideShopList"></div>
      </div>
    </div>
  </div>

  <!-- ── 캘린더 패널 ── -->
  <div class="panel" id="panel-calendar">
    <div class="cal-header">
      <div class="cal-title">이번 주 일정</div>
      <button class="btn-refresh" onclick="loadCalendar()">새로고침</button>
    </div>
    <div id="calendarList"></div>
  </div>

  <!-- ── 리마인드 패널 ── -->
  <div class="panel" id="panel-remind">
    <div class="cal-header">
      <div class="cal-title">리마인드 목록</div>
    </div>
    <div id="remindList"></div>
  </div>

  <!-- ── 쇼핑 패널 ── -->
  <div class="panel" id="panel-shop">
    <div class="cal-header">
      <div class="cal-title">쇼핑 목록</div>
    </div>
    <div id="shopList"></div>
  </div>

  <!-- ── 설정 패널 ── -->
  <div class="panel" id="panel-settings">
    <div class="settings-group">
      <div class="settings-group-title">Worker 연결</div>
      <div class="setting-row">
        <label>Cloudflare Worker URL</label>
        <input type="text" id="cfg-worker" placeholder="https://your-worker.your-subdomain.workers.dev">
      </div>
      <button class="btn-save-settings" onclick="saveSettings()">저장</button>
      <button class="btn-action" onclick="testConnection()">연결 테스트</button>
      <button class="btn-action" onclick="setupWebhook()">Webhook 등록</button>
    </div>

    <div class="settings-group">
      <div class="settings-group-title">사용자</div>
      <div class="setting-row">
        <label>내 이름 (대화 시 표시)</label>
        <input type="text" id="cfg-name" placeholder="청원">
      </div>
      <button class="btn-save-settings" onclick="saveSettings()">저장</button>
    </div>
  </div>

</div>

<script>
// ── 설정 ────────────────────────────────────────────────────
const CFG_KEY = 'ddoktti_v2_cfg';
let cfg = { worker: '', name: '청원' };

function loadCfg() {
  const raw = localStorage.getItem(CFG_KEY);
  if (raw) cfg = { ...cfg, ...JSON.parse(raw) };
  document.getElementById('cfg-worker').value = cfg.worker || '';
  document.getElementById('cfg-name').value = cfg.name || '청원';
}

function saveSettings() {
  cfg.worker = document.getElementById('cfg-worker').value.trim().replace(/\/$/, '');
  cfg.name = document.getElementById('cfg-name').value.trim() || '청원';
  localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
  showToast('설정 저장됐어요');
}

// ── 시계 ────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// ── 탭 전환 ─────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  const tabs = ['chat', 'calendar', 'remind', 'shop', 'settings'];
  const idx = tabs.indexOf(name);
  document.querySelectorAll('.tab')[idx].classList.add('active');

  if (name === 'calendar') loadCalendar();
  if (name === 'remind') loadReminds();
  if (name === 'shop') loadShops();
}

// ── 채팅 ─────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  if (!cfg.worker) { showToast('설정 탭에서 Worker URL을 입력해주세요'); return; }

  appendMsg('user', text);
  input.value = '';
  input.style.height = 'auto';

  const typingEl = showTyping();

  try {
    const res = await fetch(cfg.worker + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, senderName: cfg.name })
    });
    const data = await res.json();
    typingEl.remove();
    appendMsg('ai', data.reply || '응답을 받지 못했어요.');
  } catch (e) {
    typingEl.remove();
    appendMsg('ai', '연결에 실패했어요. Worker URL을 확인해주세요.');
  }

  // 사이드바 새로고침
  loadSidebarData();
}

function appendMsg(type, text) {
  const wrap = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg ' + type;

  const content = document.createElement('div');
  content.textContent = text;
  div.appendChild(content);

  if (type !== 'system') {
    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    div.appendChild(time);
  }

  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function showTyping() {
  const wrap = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div;
}

// ── 캘린더 ──────────────────────────────────────────────────
async function loadCalendar() {
  if (!cfg.worker) return;
  const container = document.getElementById('calendarList');
  container.innerHTML = '<div class="empty-msg">불러오는 중...</div>';

  try {
    const res = await fetch(cfg.worker + '/api/calendar?days=7');
    const events = await res.json();
    renderCalendar(events);
  } catch (e) {
    container.innerHTML = '<div class="empty-msg">캘린더 연결 실패</div>';
  }
}

function renderCalendar(events) {
  const container = document.getElementById('calendarList');
  if (!events.length) {
    container.innerHTML = '<div class="empty-msg">이번 주 일정이 없어요</div>';
    return;
  }
  container.innerHTML = '';
  events.forEach(ev => {
    const start = new Date(ev.start);
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const div = document.createElement('div');
    div.className = 'cal-event';
    div.innerHTML =
      '<div class="cal-date-badge">' +
        '<div class="month">' + months[start.getMonth()] + '</div>' +
        '<div class="day">' + start.getDate() + '</div>' +
      '</div>' +
      '<div class="cal-event-body">' +
        '<div class="cal-event-title">' + escHtml(ev.title) + '</div>' +
        '<div class="cal-event-time">' + formatEventTime(ev) + '</div>' +
      '</div>';
    container.appendChild(div);
  });
}

function formatEventTime(ev) {
  if (ev.allDay) return '종일';
  const start = new Date(ev.start);
  const end = new Date(ev.end);
  return start.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) +
    ' ~ ' + end.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
}

// ── 리마인드 ─────────────────────────────────────────────────
async function loadReminds() {
  if (!cfg.worker) return;
  try {
    const res = await fetch(cfg.worker + '/api/reminds');
    const reminds = await res.json();
    renderReminds(reminds, 'remindList');
    renderSidebarReminds(reminds);
  } catch (e) {}
}

function renderReminds(reminds, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  if (!reminds.length) {
    container.innerHTML = '<div class="empty-msg">리마인드가 없어요</div>';
    return;
  }
  const now = Date.now();
  reminds.forEach(r => {
    const div = document.createElement('div');
    div.className = 'remind-item' + (r.done ? ' done' : '');
    div.innerHTML =
      '<div class="item-check">' + (r.done ? '✓' : '') + '</div>' +
      '<div class="item-body">' +
        '<div class="item-text">' + escHtml(r.text) + '</div>' +
        '<div class="item-meta">' + (r.at ? formatTime(r.at) + ' 알림' : '시간 미지정') + '</div>' +
      '</div>';
    container.appendChild(div);
  });
}

function renderSidebarReminds(reminds) {
  const container = document.getElementById('sideRemindList');
  container.innerHTML = '';
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const tomorrow = new Date(today.getTime() + 24 * 60 * 60 * 1000);

  const todayReminds = reminds.filter(r =>
    !r.done && r.at && r.at >= today.getTime() && r.at < tomorrow.getTime()
  );

  if (!todayReminds.length) {
    container.innerHTML = '<div class="empty-msg">오늘 알림 없음</div>';
    return;
  }

  todayReminds.forEach(r => {
    const div = document.createElement('div');
    div.className = 'remind-item upcoming';
    div.innerHTML =
      '<div class="item-body">' +
        '<div class="item-text">' + escHtml(r.text) + '</div>' +
        '<div class="item-meta">' + formatTime(r.at) + '</div>' +
      '</div>';
    container.appendChild(div);
  });
}

// ── 쇼핑 ─────────────────────────────────────────────────────
async function loadShops() {
  if (!cfg.worker) return;
  try {
    const res = await fetch(cfg.worker + '/api/shops');
    const shops = await res.json();
    renderShops(shops, 'shopList');
    renderSidebarShops(shops);
  } catch (e) {}
}

function renderShops(shops, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  if (!shops.length) {
    container.innerHTML = '<div class="empty-msg">쇼핑 목록이 없어요</div>';
    return;
  }
  shops.forEach(s => {
    const div = document.createElement('div');
    div.className = 'shop-item' + (s.done ? ' done' : '');
    div.innerHTML =
      '<div class="item-check">' + (s.done ? '✓' : '') + '</div>' +
      '<div class="item-body"><div class="item-text">' + escHtml(s.text) + '</div></div>';
    container.appendChild(div);
  });
}

function renderSidebarShops(shops) {
  const container = document.getElementById('sideShopList');
  container.innerHTML = '';
  const active = shops.filter(s => !s.done);
  if (!active.length) {
    container.innerHTML = '<div class="empty-msg">항목 없음</div>';
    return;
  }
  active.forEach(s => {
    const div = document.createElement('div');
    div.className = 'shop-item';
    div.innerHTML =
      '<div class="item-body"><div class="item-text">' + escHtml(s.text) + '</div></div>';
    container.appendChild(div);
  });
}

async function loadSidebarData() {
  await Promise.all([loadReminds(), loadShops()]);
}

// ── 설정 / Webhook ───────────────────────────────────────────
async function testConnection() {
  if (!cfg.worker) { showToast('Worker URL을 먼저 입력하세요'); return; }
  try {
    const res = await fetch(cfg.worker);
    const text = await res.text();
    showToast(text.includes('똑띠') ? '연결 성공' : '응답 확인됨');
    updateStatus(true);
  } catch (e) {
    showToast('연결 실패: ' + e.message);
    updateStatus(false);
  }
}

async function setupWebhook() {
  if (!cfg.worker) { showToast('Worker URL을 먼저 입력하세요'); return; }
  try {
    const res = await fetch(cfg.worker + '/setup-webhook');
    const data = await res.json();
    showToast(data.ok ? 'Webhook 등록 완료' : 'Webhook 등록 실패: ' + data.description);
  } catch (e) {
    showToast('오류: ' + e.message);
  }
}

function updateStatus(ok) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.style.background = ok ? 'var(--ok)' : 'var(--warn)';
  text.textContent = ok ? '연결됨' : '연결 끊김';
}

// ── 유틸 ─────────────────────────────────────────────────────
function formatTime(ts) {
  return new Date(ts).toLocaleString('ko-KR', {
    month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

function escHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.textContent = msg;
  toast.style.cssText = `
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px; border-radius: 8px;
    font-size: 13px; z-index: 9999; animation: fadeUp 0.2s ease;
  `;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

// ── 리마인드 Cron 체크 (대시보드 로컬, 30초마다) ─────────────
setInterval(loadSidebarData, 30000);

// ── 초기화 ───────────────────────────────────────────────────
loadCfg();
loadSidebarData();

// 연결 상태 체크
if (cfg.worker) {
  fetch(cfg.worker).then(r => updateStatus(r.ok)).catch(() => updateStatus(false));
}
</script>
